<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>许愿蛋糕 - 点击绽放金花</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', 'Dancing Script', cursive;
        }

        #info {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 14px 28px;
            border-radius: 60px;
            backdrop-filter: blur(12px);
            z-index: 10;
            font-size: 18px;
            font-weight: 500;
            width: fit-content;
            margin: 0 auto;
            pointer-events: none;
            border: 1px solid rgba(255,215,0,0.5);
            letter-spacing: 2px;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }

        #reset-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            color: #5a3e1b;
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            font-family: inherit;
        }

        #reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255,215,0,0.4);
            background: linear-gradient(135deg, #ffe44d, #ffbb22);
        }

        #reset-btn:active {
            transform: translateY(1px);
        }

        #counter {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 40px;
            color: #ffd966;
            font-size: 16px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            font-family: monospace;
            border-left: 3px solid #ffd700;
        }

        @media (max-width: 600px) {
            #info { font-size: 14px; padding: 10px 20px; bottom: 20px; }
            #reset-btn { padding: 7px 18px; font-size: 13px; bottom: 20px; right: 20px; }
            #counter { font-size: 12px; padding: 5px 12px; top: 12px; left: 12px; }
        }

        .instruction {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 20px;
            color: #ccc;
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">🎂 点击蛋糕 ✨ 绽放金色火花 ✨</div>
    <div id="counter">✨ 许愿次数: <span id="clickCount">0</span></div>
    <div class="instruction">🖱️ 拖拽旋转视角 | 滚轮缩放</div>
    <button id="reset-btn">🔄 重置许愿</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 初始化场景 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.006);

        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 3.2, 5);
        camera.lookAt(0, 0.7, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 轨道控制
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.2;
        controls.rotateSpeed = 1.0;
        controls.target.set(0, 0.7, 0);

        // --- 华丽灯光系统 ---
        // 环境光
        const ambientLight = new THREE.AmbientLight(0x3a3a5a);
        scene.add(ambientLight);

        // 主光源方向光
        const mainLight = new THREE.DirectionalLight(0xfff0e0, 1.0);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);

        // 暖色背光
        const backLight = new THREE.PointLight(0xffaa66, 0.5);
        backLight.position.set(-2, 2, -3);
        scene.add(backLight);

        // 冷色侧补光
        const fillLight = new THREE.PointLight(0x88aaff, 0.4);
        fillLight.position.set(2, 1.5, 2.5);
        scene.add(fillLight);

        // 底部的暖光让蛋糕更诱人
        const underLight = new THREE.PointLight(0xff9966, 0.3);
        underLight.position.set(0, -0.5, 0);
        scene.add(underLight);

        // 一个会旋转的彩色光源（增加华丽感）
        const colorLight = new THREE.PointLight(0xffaa88, 0.6);
        colorLight.position.set(1, 2, 1);
        scene.add(colorLight);

        // 桌面
        const tableMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.6, metalness: 0.1 });
        const tablePlane = new THREE.Mesh(new THREE.CircleGeometry(4, 24), tableMat);
        tablePlane.rotation.x = -Math.PI / 2;
        tablePlane.position.y = -0.68;
        tablePlane.receiveShadow = true;
        scene.add(tablePlane);

        // 装饰网格
        const gridHelper = new THREE.GridHelper(8, 20, 0x88aacc, 0x335588);
        gridHelper.position.y = -0.65;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.25;
        scene.add(gridHelper);

        // --- 创建漂亮的蛋糕 ---
        const cakeGroup = new THREE.Group();

        // 蛋糕主体 (圆柱体，更圆润)
        const cakeBodyMat = new THREE.MeshStandardMaterial({ color: 0xf5c6a0, roughness: 0.3, metalness: 0.05 });
        const cakeBody = new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.6, 0.55, 64), cakeBodyMat);
        cakeBody.castShadow = true;
        cakeBody.receiveShadow = false;
        cakeGroup.add(cakeBody);

        // 奶油层 (底部边缘)
        const creamMat = new THREE.MeshStandardMaterial({ color: 0xffe4c4, roughness: 0.25 });
        const creamBase = new THREE.Mesh(new THREE.TorusGeometry(1.62, 0.08, 32, 100), creamMat);
        creamBase.rotation.x = Math.PI / 2;
        creamBase.position.y = -0.25;
        creamBase.castShadow = true;
        cakeGroup.add(creamBase);

        // 顶部奶油层
        const creamTop = new THREE.Mesh(new THREE.CylinderGeometry(1.62, 1.62, 0.12, 64), creamMat);
        creamTop.position.y = 0.32;
        creamTop.castShadow = true;
        cakeGroup.add(creamTop);

        // 奶油波浪花边 (一圈小球)
        const creamBallMat = new THREE.MeshStandardMaterial({ color: 0xffddbb });
        for (let i = 0; i < 36; i++) {
            const angle = (i / 36) * Math.PI * 2;
            const x = 1.65 * Math.cos(angle);
            const z = 1.65 * Math.sin(angle);
            const ball = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16), creamBallMat);
            ball.position.set(x, 0.28, z);
            ball.castShadow = true;
            cakeGroup.add(ball);
        }

        // 上层花边
        for (let i = 0; i < 36; i++) {
            const angle = (i / 36) * Math.PI * 2;
            const x = 1.65 * Math.cos(angle);
            const z = 1.65 * Math.sin(angle);
            const ball = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16), creamBallMat);
            ball.position.set(x, 0.44, z);
            ball.castShadow = true;
            cakeGroup.add(ball);
        }

        // 彩色糖粒装饰
        const sprinkleMat = new THREE.MeshStandardMaterial({ color: 0xffaa88 });
        const sprinkleColors = [0xff6b6b, 0xffd93d, 0x6bcf7f, 0xe86f6f, 0xffaa44];
        for (let i = 0; i < 120; i++) {
            const sprinkle = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8), new THREE.MeshStandardMaterial({ color: sprinkleColors[Math.floor(Math.random() * sprinkleColors.length)] }));
            const angle = Math.random() * Math.PI * 2;
            const rad = 0.8 + Math.random() * 0.8;
            const x = Math.cos(angle) * rad;
            const z = Math.sin(angle) * rad;
            sprinkle.position.set(x, 0.28 + Math.random() * 0.18, z);
            sprinkle.castShadow = true;
            cakeGroup.add(sprinkle);
        }

        // 顶部大樱桃
        const cherryMat = new THREE.MeshStandardMaterial({ color: 0xdc5e5e, roughness: 0.2 });
        const cherry = new THREE.Mesh(new THREE.SphereGeometry(0.16, 32), cherryMat);
        cherry.position.set(0, 0.5, 0);
        cherry.castShadow = true;
        cakeGroup.add(cherry);

        // 樱桃叶子
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x5a9e4e });
        const leafGeo = new THREE.SphereGeometry(0.09, 8);
        const leaf1 = new THREE.Mesh(leafGeo, leafMat);
        leaf1.position.set(0.12, 0.58, 0.08);
        leaf1.scale.set(0.8, 0.3, 0.6);
        cakeGroup.add(leaf1);

        const leaf2 = new THREE.Mesh(leafGeo, leafMat);
        leaf2.position.set(-0.05, 0.59, 0.13);
        leaf2.scale.set(0.7, 0.3, 0.5);
        cakeGroup.add(leaf2);

        // 蜡烛 (增加仪式感)
        const candleMat = new THREE.MeshStandardMaterial({ color: 0xffaa88 });
        const candle = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.1, 0.42, 12), candleMat);
        candle.position.set(0.4, 0.48, 0.3);
        candle.castShadow = true;
        cakeGroup.add(candle);

        // 烛火
        const flameMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff4400, emissiveIntensity: 0.6 });
        const flame = new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.12, 8), flameMat);
        flame.position.set(0.4, 0.7, 0.3);
        cakeGroup.add(flame);

        scene.add(cakeGroup);

        // --- 金色粒子特效系统 ---
        let activeParticles = [];

        function createGoldenSparkle(position) {
            const particleCount = 60;
            const particles = [];

            for (let i = 0; i < particleCount; i++) {
                // 创建小平面粒子 (使用 Sprite 更亮眼)
                const canvas = document.createElement('canvas');
                canvas.width = 32;
                canvas.height = 32;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = `hsl(${45 + Math.random() * 30}, 100%, 60%)`;
                ctx.beginPath();
                ctx.arc(16, 16, 8, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = `hsl(${50 + Math.random() * 20}, 100%, 70%)`;
                ctx.beginPath();
                ctx.arc(16, 16, 4, 0, 2 * Math.PI);
                ctx.fill();

                const texture = new THREE.CanvasTexture(canvas);
                const material = new THREE.SpriteMaterial({
                    map: texture,
                    blending: THREE.AdditiveBlending,
                    transparent: true,
                    opacity: 1
                });
                const sprite = new THREE.Sprite(material);

                // 随机速度方向
                const angle = Math.random() * Math.PI * 2;
                const angleV = Math.random() * Math.PI * 0.8 - 0.4;
                const speed = 0.03 + Math.random() * 0.05;
                const vx = Math.cos(angle) * Math.cos(angleV) * speed;
                const vz = Math.sin(angle) * Math.cos(angleV) * speed;
                const vy = Math.sin(angleV) * speed + 0.08;

                sprite.position.copy(position);
                sprite.scale.set(0.15, 0.15, 1);
                sprite.userData = {
                    vx: vx,
                    vy: vy,
                    vz: vz,
                    life: 1.0,
                    decay: 0.012 + Math.random() * 0.01
                };

                scene.add(sprite);
                particles.push(sprite);
            }

            activeParticles.push(...particles);

            // 额外添加几个大星芒
            for (let i = 0; i < 8; i++) {
                const canvas = document.createElement('canvas');
                canvas.width = 48;
                canvas.height = 48;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = `hsl(${50 + Math.random() * 20}, 100%, 65%)`;
                ctx.beginPath();
                ctx.arc(24, 24, 12, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = '#ffdd88';
                ctx.beginPath();
                ctx.arc(24, 24, 6, 0, 2 * Math.PI);
                ctx.fill();

                const texture = new THREE.CanvasTexture(canvas);
                const material = new THREE.SpriteMaterial({ map: texture, blending: THREE.AdditiveBlending, transparent: true });
                const star = new THREE.Sprite(material);
                const angle2 = Math.random() * Math.PI * 2;
                star.position.set(
                    position.x + (Math.random() - 0.5) * 0.5,
                    position.y + Math.random() * 0.5,
                    position.z + (Math.random() - 0.5) * 0.5
                );
                star.scale.set(0.25, 0.25, 1);
                star.userData = {
                    vx: (Math.random() - 0.5) * 0.04,
                    vy: Math.random() * 0.06,
                    vz: (Math.random() - 0.5) * 0.04,
                    life: 1.0,
                    decay: 0.008
                };
                scene.add(star);
                activeParticles.push(star);
            }
        }

        // 更新所有粒子动画
        function updateParticles() {
            for (let i = activeParticles.length - 1; i >= 0; i--) {
                const p = activeParticles[i];
                p.userData.life -= p.userData.decay;

                if (p.userData.life <= 0) {
                    scene.remove(p);
                    activeParticles.splice(i, 1);
                    continue;
                }

                // 移动
                p.position.x += p.userData.vx;
                p.position.y += p.userData.vy;
                p.position.z += p.userData.vz;

                // 重力影响
                p.userData.vy -= 0.002;

                // 淡出
                p.material.opacity = p.userData.life;
                p.scale.multiplyScalar(0.98);
            }
        }

        // --- 点击计数器 ---
        let clickCount = 0;
        const countDisplay = document.getElementById('clickCount');

        // --- 点击交互：绽放金花 ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            // 检测蛋糕的所有部分
            const clickableObjects = [cakeBody, creamTop, cherry, candle, flame, ...cakeGroup.children];
            const intersects = raycaster.intersectObjects(clickableObjects, true);

            if (intersects.length > 0) {
                // 点击蛋糕，绽放金色火花
                const hitPoint = intersects[0].point;
                createGoldenSparkle(hitPoint);

                // 更新计数
                clickCount++;
                countDisplay.textContent = clickCount;

                // 改变提示文字效果
                const infoDiv = document.getElementById('info');
                infoDiv.innerHTML = '✨ 金色火花绽放！许愿成功 ✨';
                setTimeout(() => {
                    infoDiv.innerHTML = '🎂 点击蛋糕 ✨ 绽放金色火花 ✨';
                }, 1200);

                // 闪烁一下灯光
                colorLight.intensity = 1.2;
                setTimeout(() => { colorLight.intensity = 0.6; }, 200);

                // 可选：播放简单音效的感觉（视觉反馈）
                flame.material.emissiveIntensity = 1.2;
                setTimeout(() => { flame.material.emissiveIntensity = 0.6; }, 150);
            }
        });

        // 重置计数器
        document.getElementById('reset-btn').addEventListener('click', () => {
            clickCount = 0;
            countDisplay.textContent = clickCount;

            // 清除所有现有粒子
            activeParticles.forEach(p => scene.remove(p));
            activeParticles = [];

            const infoDiv = document.getElementById('info');
            infoDiv.innerHTML = '✨ 许愿次数已重置 ✨';
            setTimeout(() => {
                infoDiv.innerHTML = '🎂 点击蛋糕 ✨ 绽放金色火花 ✨';
            }, 1200);
        });

        // --- 氛围粒子（背景星空）---
        const starCount = 800;
        const starGeo = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffdd88, size: 0.08, transparent: true, opacity: 0.5 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        function animateStars() {
            stars.rotation.y += 0.0003;
            stars.rotation.x += 0.0002;
            requestAnimationFrame(animateStars);
        }
        animateStars();

        // 动态彩色光源旋转
        let time = 0;

        // --- 主渲染循环 ---
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;

            // 让彩色光源绕蛋糕旋转
            colorLight.position.x = 1.5 + Math.sin(time) * 0.8;
            colorLight.position.z = 1.2 + Math.cos(time * 0.9) * 0.8;

            // 蜡烛火焰微微跳动
            flame.position.y = 0.7 + Math.sin(time * 15) * 0.008;
            flame.scale.setScalar(0.9 + Math.sin(time * 20) * 0.1);

            // 更新粒子
            updateParticles();

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // 窗口适配
        window.addEventListener('resize', onWindowResize);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        console.log('许愿蛋糕已启动 — 点击蛋糕绽放金色火花！');
    </script>
</body>
</html>
